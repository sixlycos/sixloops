interface:
  display_name: "SixLoops"
  short_description: "Map X-to-B changes and design reusable agent loops"
  default_prompt: "Use SixLoops to design the first useful goal loop for this repo. If I give a fresh goal, start with a Change Map: current X, target B, user perception, affected surfaces, regression path, and rollout waves; create GOAL/STATE/TEAM artifacts only when an artifact packet is useful. If I ask for history, mine local sessions or bounded project evidence. Keep verifier, state, stop condition, decision packet, and high-impact return point explicit."
